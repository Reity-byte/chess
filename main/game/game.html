<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess</title>
    <link rel="stylesheet" href="game.css">
    <script src="engine.js"   defer></script>
    <script src="ai.js"       defer></script>
    <script src="notation.js" defer></script>
    <script src="game-script.js" defer></script>
</head>
<body class="game-body">

    <!-- ── MAIN LAYOUT ──────────────────────────────────────────────── -->
    <div class="game-layout">

        <!-- Board -->
        <div id="chessboard" class="board"></div>

        <!-- Right sidebar -->
        <aside class="sidebar">

            <!-- Player tags -->
            <div class="player-tag player-top">
                <div class="player-avatar" id="topAvatar">♟</div>
                <span class="player-name" id="topName">Engine (Black)</span>
            </div>

            <!-- Move history panel -->
            <div class="history-panel">
                <div class="history-scroll">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th class="col-num">#</th>
                                <th class="col-move">White</th>
                                <th class="col-move">Black</th>
                            </tr>
                        </thead>
                        <tbody id="move-history-body">
                            <!-- rows injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Player tags -->
            <div class="player-tag player-bottom">
                <div class="player-avatar" id="bottomAvatar">♙</div>
                <span class="player-name" id="bottomName">You (White)</span>
            </div>

            <!-- Buttons -->
            <div class="game-buttons">
                <button id="startButton"  class="button confirm">Start</button>
                <button id="exitButton"   class="button cancel">Exit</button>
            </div>

        </aside>
    </div>

    <!-- ── SETUP MODAL ───────────────────────────────────────────────── -->
    <div id="setupModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>New Game</h2>

            <p style="margin-bottom:10px;">Mode</p>
            <div class="modal-buttons" style="margin-bottom:24px;">
                <button id="modeHumanBtn" class="button confirm setup-choice selected" data-mode="human">vs AI</button>
                <button id="modeAiBtn"    class="button cancel setup-choice"  data-mode="ai">AI vs AI</button>
            </div>

            <div id="colorChoiceRow">
                <p style="margin-bottom:10px;">Play as</p>
                <div class="modal-buttons" style="margin-bottom:24px;">
                    <button id="colorWhiteBtn"  class="button confirm setup-choice selected" data-color="white">White</button>
                    <button id="colorBlackBtn"  class="button cancel setup-choice"  data-color="black">Black</button>
                    <button id="colorRandomBtn" class="button cancel setup-choice"  data-color="random">Random</button>
                </div>
            </div>

            <div class="modal-buttons">
                <button id="beginGameButton" class="button confirm">Begin</button>
            </div>
        </div>
    </div>

    <!-- ── GAME OVER MODAL ───────────────────────────────────────────── -->
    <div id="gameOverModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 id="modalMessage">Game Over!</h2>
            <div class="modal-buttons">
                <button id="restartButton"   class="button confirm">Play Again</button>
                <button id="closeModalButton" class="button cancel">Close</button>
            </div>
        </div>
    </div>

    <!-- ── PROMOTION MODAL ───────────────────────────────────────────── -->
    <div id="promotionModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 style="margin-bottom:20px">Promote Pawn</h2>
            <div class="promotion-options">
                <img id="promo-queen"  class="promo-piece" src="" data-type="queen">
                <img id="promo-rook"   class="promo-piece" src="" data-type="rook">
                <img id="promo-bishop" class="promo-piece" src="" data-type="bishop">
                <img id="promo-knight" class="promo-piece" src="" data-type="knight">
            </div>
        </div>
    </div>

</body>
</html>

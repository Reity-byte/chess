<!DOCTYPE HTML>
    <html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <link rel="stylesheet" href="game.css">
    <script src="engine.js" defer></script>
    <script src="game-script.js" defer></script>
</head>
<body class = "game-body">
    <div id="chessboard" class="board">
        <!-- Chess board will be generated here -->
    </div>
    <div id="moves" class = "moves">
        <!-- Move history will be displayed here -->
    </div>
    <div class = "game-buttons">
        <button id="startButton" class="button">Start Game</button>
        <button id="exitButton" class="button">Exit</button>
    </div>
    <div id="gameOverModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h2 id="modalMessage">Game Over!</h2>
        <div class="modal-buttons">
            <button id="restartButton" class="button">Play Again</button>
            <button id="closeModalButton" class="button">Close</button>
        </div>
    </div>
</div>
<div id="promotionModal" class="modal-overlay hidden">
    <div class="modal-content">
        <h2 style="margin-bottom: 20px;">Promote Pawn</h2>
        <div class="promotion-options">
            <img id="promo-queen" class="promo-piece" src="" data-type="queen">
            <img id="promo-rook" class="promo-piece" src="" data-type="rook">
            <img id="promo-bishop" class="promo-piece" src="" data-type="bishop">
            <img id="promo-knight" class="promo-piece" src="" data-type="knight">
        </div>
    </div>
</div>
</body>
    </html>
